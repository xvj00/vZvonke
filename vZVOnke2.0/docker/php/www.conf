[www]
user = www-data
group = www-data
listen = 9000

; На сервере 2GB RAM: pm=static с 3 воркерами безопаснее dynamic.
; Каждый PHP-FPM воркер потребляет ~30-50MB.
; 3 воркера = ~150MB суммарно.
pm = static
pm.max_children = 3

; Перезапускаем воркер после 500 запросов (защита от утечек памяти)
pm.max_requests = 500
