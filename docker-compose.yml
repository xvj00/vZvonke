# Запуск из каталога diplomSam:
#   cp env.docker.example .env   (и заполнить)
#   docker compose build --no-cache
#   docker compose up -d
#
# ВебРТК / mediasoup:
#   Контейнер mediasoup использует network_mode: host — это стандартное решение на Linux.
#   При host-сети не нужно пробрасывать тысячи UDP-портов через iptables,
#   и WebRTC/ICE работает надёжнее.
#   Важно: на Windows/macOS host-сеть не работает — для локальной разработки
#   используйте docker-compose.dev.yml или уберите network_mode: host.
#
#   На хостинге откройте в фаерволе:
#     TCP: 80 (HTTP), 4001 (сигналинг mediasoup)
#     UDP: диапазон RTC_MIN_PORT–RTC_MAX_PORT (по умолчанию 40000-49999)

services:
  db:
    image: mysql:8.0-oraclelinux8
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb_buffer_pool_size=128M
      --innodb_log_file_size=32M
      --max_connections=50
      --performance_schema=OFF
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?}
      MYSQL_DATABASE: ${DB_DATABASE:-vzvonke}
      MYSQL_USER: ${DB_USERNAME:-vzvonke}
      MYSQL_PASSWORD: ${DB_PASSWORD:?}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s

  laravel:
    build:
      context: ./vZVOnke2.0
    restart: unless-stopped
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY:?}
      APP_URL: ${APP_URL:?}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-vzvonke}
      DB_USERNAME: ${DB_USERNAME:-vzvonke}
      DB_PASSWORD: ${DB_PASSWORD:?}
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: sync
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost}
      MEDIASOUP_INTERNAL_SECRET: ${MEDIASOUP_INTERNAL_SECRET:-}
      MEDIASOUP_INTERNAL_URL: "http://host.docker.internal:${MEDIASOUP_PORT:-4001}"
    volumes:
      - laravel_storage:/var/www/storage
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_APP_BASE_URL: ${VITE_APP_BASE_URL:-}
        VITE_MEDIASOUP_SIGNALING_URL: ${VITE_MEDIASOUP_SIGNALING_URL:?}
        VITE_REQUIRE_AUTH_FOR_CALLS: ${VITE_REQUIRE_AUTH_FOR_CALLS:-true}
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - laravel_storage:/mnt/laravel-storage:ro
    deploy:
      resources:
        limits:
          memory: 64M
    depends_on:
      - laravel

  mediasoup:
    build: ./mediasoup-server
    restart: unless-stopped
    # network_mode: host — единственный надёжный способ для WebRTC на Linux VPS.
    # При bridge-режиме Docker создаёт тысячи iptables-правил для UDP-диапазона
    # (по умолчанию 10 000 портов) — сервер стартует очень долго или не стартует.
    # При host-сети контейнер разделяет сетевой стек с хостом напрямую.
    network_mode: host
    env_file:
      - .env
    environment:
      PORT: ${MEDIASOUP_PORT:-4001}
      # При network_mode: host слушаем на 0.0.0.0, а ICE-кандидаты объявляем через IP хоста
      MEDIASOUP_LISTEN_IP: 0.0.0.0
      MEDIASOUP_ANNOUNCED_IP: ${MEDIASOUP_ANNOUNCED_IP:?}
      LARAVEL_API_URL: ${LARAVEL_API_URL:-http://127.0.0.1/api}
      REQUIRE_ROOM_AUTH: ${REQUIRE_ROOM_AUTH:-true}
      RTC_MIN_PORT: ${RTC_MIN_PORT:-40000}
      RTC_MAX_PORT: ${RTC_MAX_PORT:-49999}
      EMPTY_ROOM_GRACE_MS: ${EMPTY_ROOM_GRACE_MS:-30000}
      MAX_PEERS_PER_ROOM: ${MAX_PEERS_PER_ROOM:-20}
      MEDIASOUP_NUM_WORKERS: ${MEDIASOUP_NUM_WORKERS:-1}
      MEDIASOUP_INITIAL_OUTGOING_BITRATE: ${MEDIASOUP_INITIAL_OUTGOING_BITRATE:-600000}
      MEDIASOUP_MAX_INCOMING_BITRATE: ${MEDIASOUP_MAX_INCOMING_BITRATE:-}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
      MEDIASOUP_INTERNAL_SECRET: ${MEDIASOUP_INTERNAL_SECRET:-}
    # При network_mode: host ports: НЕ нужен — контейнер уже на сетевом стеке хоста
    depends_on:
      - web
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  mysql_data:
  laravel_storage:
