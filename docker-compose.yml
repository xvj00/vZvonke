services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: vzvonke
      MYSQL_USER: vzvonke
      MYSQL_PASSWORD: vzvonke_secret
      MYSQL_ROOT_PASSWORD: root_secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_secret"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./vZVOnke2.0
      dockerfile: Dockerfile.dev
    container_name: laravel
    working_dir: /var/www
    volumes:
      - ./vZVOnke2.0:/var/www
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: vzvonke
      DB_USERNAME: vzvonke
      DB_PASSWORD: vzvonke_secret
      FILESYSTEM_DISK: public
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: secretkey
      LIVEKIT_URL: ws://livekit:7880
    depends_on:
      mysql:
        condition: service_healthy
      livekit:
        condition: service_started

  frontend:
    build:
      context: ./livekit-frontend
      dockerfile: Dockerfile.dev
    container_name: frontend
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      VITE_API_URL: /api
      VITE_LIVEKIT_WS_URL: wss://vzvonke.ru:8443/livekit
    volumes:
      - ./livekit-frontend:/app
      - /app/node_modules

  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit
    command: --config /livekit.yaml
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "50000-50050:50000-50050/udp"
    volumes:
      - ./vZVOnke2.0/livekit_server/livekit.yaml:/livekit.yaml

volumes:
  mysql_data:
